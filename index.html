<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<title>Pro IDE Previewer</title>
<!-- 引入 Highlight.js GitHub Dark 主题 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
:root {
    --vs-bg: #0d1117;
    --vs-header: #161b22;
    --vs-tab-active: #0d1117;
    --vs-tab-inactive: #010409;
    --vs-border: #30363d;
    --vs-text: #c9d1d9;
    --vs-accent: #2f81f7;
    --vs-hover: #21262d;
    --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', 'Courier New', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: var(--vs-bg);
    color: var(--vs-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column; 
    overflow: hidden;
}

/* 顶部 Tab 栏 */
header {
    background: var(--vs-header);
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-right: 12px;
    border-bottom: 1px solid var(--vs-border);
    flex-shrink: 0;
    z-index: 10;
}

.tabs { display: flex; height: 100%; align-items: flex-end; }
.tab {
    padding: 0 20px;
    height: 100%;
    display: flex; align-items: center;
    font-size: 12px;
    background: var(--vs-tab-inactive);
    color: #8b949e;
    cursor: pointer;
    border-right: 1px solid var(--vs-border);
    border-top: 2px solid transparent;
    user-select: none;
    transition: 0.2s;
    text-transform: uppercase;
}
.tab.active {
    background: var(--vs-tab-active);
    color: #f0f6fc;
    border-top: 2px solid var(--vs-accent);
}

.actions { display: flex; align-items: center; gap: 8px; }
.btn {
    background: transparent; border: none; color: #8b949e;
    padding: 5px; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.btn:hover { background: var(--vs-hover); color: #58a6ff; }
.btn svg { width: 18px; height: 18px; fill: currentColor; }

@keyframes spin { 100% { transform: rotate(360deg); } }
.btn.spinning svg { animation: spin 1s linear infinite; color: var(--vs-accent); }

/* 主区域容器 */
main { flex: 1; position: relative; overflow: hidden; }

.panel { 
    position: absolute; inset: 0; 
    display: flex; flex-direction: column; 
    visibility: hidden; opacity: 0; 
    transition: opacity 0.2s; 
}
.panel.active { visibility: visible; opacity: 1; z-index: 2; }

/* ================= 照抄恢复：横向滚动条核心布局 ================= */
#view-code {
    flex: 1; width: 100%; height: 100%;
    overflow: auto !important; /* 滚动条权限交给此层，确保横向滚动条吸底 */
    background: var(--vs-bg);
}

/* 保持代码原始格式的关键 pre 标签 */
pre#code-pre {
    margin: 0;
    padding: 20px;
    width: fit-content; /* 允许宽度根据长行代码伸展 */
    min-width: 100%;
    box-sizing: border-box;
}

code#code-box {
    font-family: var(--font-mono) !important;
    font-size: 14px !important;
    line-height: 1.6;
    background: transparent !important;
    display: block;
    white-space: pre; /* 绝对保留换行和回车 */
}

/* ================= 照抄恢复：VS Code 专业滚动条样式 ================= */
#view-code::-webkit-scrollbar { width: 12px; height: 12px; }
#view-code::-webkit-scrollbar-corner { background: transparent; }
#view-code::-webkit-scrollbar-thumb {
    background: rgba(121, 121, 121, 0.4); 
    border-radius: 10px;
    border: 3px solid transparent;
    background-clip: content-box;
}
#view-code::-webkit-scrollbar-thumb:hover { background: rgba(121, 121, 121, 0.7); background-clip: content-box; }
#view-code::-webkit-scrollbar-track { background: transparent; }

/* 预览视图 */
#preview-wrapper { width: 100%; height: 100%; background: #fff; }
#preview-frame { width: 100%; height: 100%; border: none; }

.empty-msg {
    height: 100%; width: 100%; display: flex; align-items: center; justify-content: center;
    color: #484f58; font-size: 14px; position: absolute; background: var(--vs-bg);
}

#toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #21262d; color: #f0f6fc; padding: 8px 16px; font-size: 13px;
    border-radius: 6px; border: 1px solid var(--vs-border); display: none; z-index: 1000;
}
</style>
</head>
<body>

<header>
    <div class="tabs">
        <div class="tab active" id="tab-preview">Preview</div>
        <div class="tab" id="tab-code">Code</div>
    </div>
    <div class="actions">
        <button class="btn" id="btn-refresh" title="Refresh" style="display:none;">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
        <button class="btn" id="lang-switch">ZH / EN</button>
        <button class="btn" id="btn-copy">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
    </div>
</header>

<main>
    <div id="toast">Copied</div>
    <div id="panel-preview" class="panel active">
        <div id="preview-wrapper"><iframe id="preview-frame"></iframe></div>
        <div id="empty-view" class="empty-msg">Waiting for code streaming...</div>
    </div>
    <div id="panel-code" class="panel">
        <div id="view-code">
            <pre id="code-pre"><code id="code-box" class="hljs"></code></pre>
        </div>
    </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>
const CONFIG = {
    renderDelay: 300,
    isPreviewable: (l) => ['html', 'xml', 'svg', 'markup', 'htm'].includes(l)
};

const i18n = {
    zh: { preview: "实时预览", waiting: "正在接收代码流...", copied: "已复制" },
    en: { preview: "Preview", waiting: "Waiting for code streaming...", copied: "Copied" }
};

let currentLang = 'zh';
const state = { raw: '', lastCode: '', currentCode: '', currentType: 'html', view: 'preview', isFirstRender: true };
let renderTimer = null;

const dom = {
    tabPreview: document.getElementById('tab-preview'),
    tabCode: document.getElementById('tab-code'),
    panelPreview: document.getElementById('panel-preview'),
    panelCode: document.getElementById('panel-code'),
    iframe: document.getElementById('preview-frame'),
    viewCode: document.getElementById('view-code'),
    codeBox: document.getElementById('code-box'),
    emptyView: document.getElementById('empty-view'),
    btnRefresh: document.getElementById('btn-refresh'),
    toast: document.getElementById('toast'),
    btnLang: document.getElementById('lang-switch')
};

function updateLangUI() {
    dom.tabPreview.innerText = i18n[currentLang].preview;
    if (!state.currentCode) dom.emptyView.innerText = i18n[currentLang].waiting;
}

function extractCode(text) {
    const regex = /```([a-zA-Z0-9]*)\n([\s\S]*?)(?:```|$)/g;
    let match, last = null;
    while ((match = regex.exec(text)) !== null) {
        last = { type: match[1].toLowerCase() || 'txt', content: match[2] };
    }
    return last;
}

function smartRender(force = false) {
    if (!state.currentCode || (!force && state.currentCode === state.lastCode)) return;

    dom.tabCode.innerText = state.currentType || 'CODE';
    dom.btnRefresh.style.display = CONFIG.isPreviewable(state.currentType) ? 'flex' : 'none';

    // --- 粘性滚动判定 ---
    const container = dom.viewCode;
    const isAtBottom = (container.scrollHeight - container.scrollTop - container.clientHeight) < 50;

    // 更新内容：保持 pre + code 结构
    dom.codeBox.className = `hljs language-${state.currentType}`;
    dom.codeBox.textContent = state.currentCode;
    hljs.highlightElement(dom.codeBox);

    // --- 粘性滚动执行 ---
    if (isAtBottom) {
        requestAnimationFrame(() => {
            container.scrollTop = container.scrollHeight;
        });
    }

    // 预览更新
    clearTimeout(renderTimer);
    dom.btnRefresh.classList.add('spinning');
    renderTimer = setTimeout(() => {
        executeSeamlessPreview();
        dom.btnRefresh.classList.remove('spinning');
    }, CONFIG.renderDelay);
}

function executeSeamlessPreview() {
    if (!CONFIG.isPreviewable(state.currentType)) {
        dom.iframe.style.display = 'none';
        dom.emptyView.style.display = 'flex';
        return;
    }
    dom.emptyView.style.display = 'none';
    dom.iframe.style.display = 'block';

    let html = state.currentCode;
    if (!html.toLowerCase().includes('<html')) {
        html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:sans-serif;padding:20px;line-height:1.6;margin:0;background:#fff;}</style></head><body>${html}</body></html>`;
    }

    const doc = dom.iframe.contentWindow?.document;
    if (state.isFirstRender || !doc || !doc.body) {
        dom.iframe.srcdoc = html;
        state.isFirstRender = false;
        state.lastCode = state.currentCode;
        return;
    }

    try {
        const parser = new DOMParser();
        const newDoc = parser.parseFromString(html, 'text/html');
        if (doc.head.innerHTML !== newDoc.head.innerHTML) doc.head.innerHTML = newDoc.head.innerHTML;
        const scrollY = dom.iframe.contentWindow.scrollY;
        doc.body.innerHTML = newDoc.body.innerHTML;
        
        doc.body.querySelectorAll('script').forEach(oldScript => {
            const newScript = doc.createElement('script');
            Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
            newScript.appendChild(doc.createTextNode(oldScript.innerHTML));
            oldScript.parentNode.replaceChild(newScript, oldScript);
        });
        dom.iframe.contentWindow.scrollTo(0, scrollY);
        state.lastCode = state.currentCode;
    } catch (e) {
        dom.iframe.srcdoc = html;
        state.lastCode = state.currentCode;
    }
}

function switchView(v) {
    state.view = v;
    dom.tabPreview.classList.toggle('active', v === 'preview');
    dom.tabCode.classList.toggle('active', v === 'code');
    dom.panelPreview.classList.toggle('active', v === 'preview');
    dom.panelCode.classList.toggle('active', v === 'code');
}

dom.tabPreview.onclick = () => switchView('preview');
dom.tabCode.onclick = () => switchView('code');
dom.btnLang.onclick = () => { currentLang = currentLang === 'zh' ? 'en' : 'zh'; updateLangUI(); };
dom.btnRefresh.onclick = () => { state.isFirstRender = true; smartRender(true); };
document.getElementById('btn-copy').onclick = () => {
    navigator.clipboard.writeText(state.currentCode).then(() => {
        dom.toast.innerText = i18n[currentLang].copied;
        dom.toast.style.display = 'block';
        setTimeout(() => dom.toast.style.display = 'none', 2000);
    });
};

function initWS() {
    const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws');
    ws.onopen = () => ws.send(JSON.stringify({type:'get_messages'}));
    ws.onmessage = e => {
        try {
            const data = JSON.parse(e.data);
            const msgs = data.data.messages;
            const last = msgs.filter(m => m.role === 'assistant').pop();
            if (!last) return;
            const content = last.pure_content || last.content;
            if (content === state.raw) return;
            state.raw = content;
            const result = extractCode(content);
            if (result) {
                state.currentCode = result.content;
                state.currentType = result.type;
                smartRender(); 
            }
        } catch(err) {}
    };
    ws.onclose = () => setTimeout(initWS, 3000);
}

updateLangUI();
initWS();
</script>
</body>
</html>
